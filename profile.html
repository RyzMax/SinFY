<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - MyMusic</title>
    <link rel="stylesheet" href="profile.css">
        <link rel="icon" href="note.png" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">

</head>
<body>
    <header class="header">
        <a href="index.html" class="back-btn">← На главную</a>
        <h1>Профиль</h1>
    </header>

    <main class="profile-page">
        <section class="user-info">
            <div class="avatar" style="background-image: url('avatar.jpg');"></div>
            <div class="user-details">
                <h1 class="nickname">@tozavi</h1>
                <p class="user-description">
                    Тесттесттестетстестетстетстест
                </p>
                <div class="user-stats">
                    <span class="stat">127 треков</span>
                    <span class="stat">4.2K прослушиваний</span>
                    <span class="stat">89 подписчиков</span>
                </div>
            </div>
        </section>


        <section class="tracks-section">
            <h2>Мои треки</h2>
            <div class="tracks-grid">
                <div class="track-card">
                    <img src="cover1.jpg" alt="Обложка" class="track-cover">
                    <div class="track-info">
                        <h3>Ночной город</h3>
                        <p class="track-meta">Rock • 3:45 • 1.2K просл.</p>
                        <audio controls preload="metadata">
                            <source src="track1.mp3" type="audio/mpeg">
                        </audio>
                    </div>
                </div>
   
                <div class="track-card">
                    <img src="cover2.jpg" alt="Обложка" class="track-cover">
                    <div class="track-info">
                        <h3>Эхо</h3>
                        <p class="track-meta">Electronic • 4:12 • 890 просл.</p>
                        <audio controls preload="metadata">
                            <source src="track2.mp3" type="audio/mpeg">
                        </audio>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span>© 2026 MyMusic</span>
            <a href="support.html">Поддержка</a>
        </div>
    </footer>
</body>
</html>
